<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campamento</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=MedievalSharp&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #ffd54f;
  font-family: 'MedievalSharp', cursive;
  overflow-x: hidden;
}

.fondo {
  position: fixed;
  inset: 0;
  opacity: 0.4;
  background-size: cover;
  background-position: center;
}

/* animaciones */
@keyframes parpadeo {
 0%, 100% { opacity: 0.6; }
 50% { opacity: 0.9; filter: blur(70px); }
}

@keyframes subir {
 0% { transform: translateY(0) scale(1); opacity: 1; }
 100% { transform: translateY(-250px) scale(0); opacity: 0; }
}

/* pergamino */
.pergamino {
  background: linear-gradient(135deg, #3e2723 0%, #5d4037 50%, #3e2723 100%);
  border: 3px solid #8d6e63;
  box-shadow: 0 0 30px rgba(255, 140, 0, 0.4), inset 0 0 20px rgba(0,0,0,0.5);
  border-radius: 16px;
  padding: 20px;
  margin: 20px;
}

.titulo-baldur {
  font-family: 'Cinzel', serif;
  text-shadow: 0 0 20px #ff6f00, 2px 2px 4px #000;
  color: #ffd54f;
}

nav { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px; }

.btn {
  padding: 12px 24px;
  border-radius: 12px;
  border: 2px solid #8d6e63;
  background: #5d4037;
  color: #ffd54f;
  cursor: pointer;
  font-family: 'Cinzel';
  font-size: 16px;
  transition: 0.2s;
}

.btn:hover { background: #6d4c41; }
.btn.activo { background: #8d6e63; color: #ffecb3; }

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  background: #2e1a17;
  border: 2px solid #8d6e63;
  color: #ffecb3;
  font-family: 'MedievalSharp';
}

.card {
  background: #3e2723;
  border-left: 4px solid #ff6f00;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
}

.oculto { display: none; }

#mapaCanvas {
  border: 4px solid #8d6e63;
  border-radius: 12px;
  cursor: crosshair;
  width: 100%;
}

#tooltip {
  position: fixed !important;
  z-index: 2147483647 !important;
  display: none;
  background: #3e2723;
  color: #ffecb3;
  padding: 10px;
  border: 2px solid #ff6f00;
  border-radius: 8px;
  pointer-events: none;
}

/* inventario */
.item-inventario{
  position: relative;
  background: linear-gradient(135deg, #2b1a16, #3e2723);
  border: 2px solid #8d6e63;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.item-inventario:hover{
  transform: scale(1.03);
  border-color: #ff6f00;
}

/* libro */
.libro{ max-width:800px; margin:auto; perspective:1000px; }

.pagina{
  background: linear-gradient(to bottom,#f4e4bc,#e6d0a3);
  color:#2c1810;
  padding:50px;
  border-radius:10px;
  border:3px solid #8d6e63;
  min-height:500px;
}

/* fuego */
.campfire{ position: relative; width: 80px; height: 120px; }
</style>
</head>

<body>

<div class="fondo"></div>

<div id="inicio" class="pergamino" style="max-width:700px;margin:100px auto;text-align:center;">
  <h1 class="titulo-baldur">Crónicas de ceniza y escarcha</h1>
  <button class="btn" onclick="entrarCampamento()">🔥 Entrar</button>
</div>

<div id="app" class="oculto">

  <nav>
    <button class="btn" onclick="mostrarTab('capitulos')">Capítulos</button>
    <button class="btn" onclick="mostrarTab('personajes')">Personajes</button>
    <button class="btn" onclick="mostrarTab('mapa')">Mapa</button>
  </nav>

  <div id="tab-capitulos" class="pergamino oculto">
    <h2 class="titulo-baldur">Relatos</h2>
    <div id="listaCapitulos"></div>
  </div>

  <div id="tab-personajes" class="pergamino oculto">
    <h2 class="titulo-baldur">Compañeros</h2>
    <div id="listaPersonajes"></div>
  </div>

  <div id="tab-mapa" class="pergamino oculto">
    <h2 class="titulo-baldur">Mapa</h2>
    <img id="mapaImg">
    <canvas id="mapaCanvas"></canvas>
  </div>

</div>

<script>
// ================= DATA =================
let data = {
  capitulos: [],
  personajes: [],
  ciudades: [],
  inventario: {}
};

let capituloActual = 0;

// ================= INIT =================
async function iniciarCarga(){
  data.capitulos = await fetch("data/historias.json").then(r=>r.json());
  data.personajes = await fetch("data/personajes.json").then(r=>r.json());
  data.inventario = await fetch("data/inventario.json").then(r=>r.json());
  data.ciudades = await fetch("data/mapa.json").then(r=>r.json());

  document.querySelector(".fondo").style.backgroundImage = "url('assets/fondo.jpg')";
  document.getElementById("mapaImg").src = "assets/mapa.jpg";

  renderTodo();
}

// ================= NAV =================
function mostrarTab(tab){
  document.getElementById("inicio").classList.add("oculto");
  document.getElementById("app").classList.remove("oculto");

  ["capitulos","personajes","mapa"].forEach(t=>{
    document.getElementById("tab-"+t).classList.toggle("oculto", t!==tab);
  });
}

// ================= START =================
function entrarCampamento(){
  mostrarTab("capitulos");
  const m = document.getElementById("musicaFondo");
  if(m) m.play();
}

// ================= RENDER =================
function renderTodo(){
  document.getElementById("listaCapitulos").innerHTML =
    data.capitulos.map(c=>`<div class="card">${c.titulo}</div>`).join("");

  document.getElementById("listaPersonajes").innerHTML =
    data.personajes.map(p=>`<div class="card">${p.nombre}</div>`).join("");
}

iniciarCarga();
</script>

</body>
</html>
